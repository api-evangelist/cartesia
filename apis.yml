aid: cartesia
name: Cartesia
description: Cartesia is a real-time multimodal AI platform built around the Sonic
  family of ultra-low-latency text-to-speech models and the Ink streaming speech-to-text
  models. Sonic models deliver the first audio byte in as little as 90ms, support
  more than 40 languages, and can express laughter and emotion, making them well-suited
  to conversational AI, voice agents, dubbing, and avatar applications. Ink models
  add streaming transcription with native turn detection optimized for voice agents.
  Cartesia ships Python, JavaScript, and Go SDKs and exposes REST, server-sent events,
  and WebSocket interfaces for streaming audio. The platform is SOC 2 Type II, HIPAA,
  and PCI Level 1 aligned.
